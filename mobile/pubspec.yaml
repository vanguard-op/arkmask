name: ark_mask
description: ArkMask — generate faceless AI videos from written stories.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.3.0

  # State management
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.8

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.4.1

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5

  # Networking
  dio: ^5.9.2

  # UI
  lucide_flutter: ^1.20.0
  google_fonts: ^8.1.0
  flutter_markdown_plus: ^1.0.7

  # Video
  video_player: ^2.11.1
  ffmpeg_kit_flutter_new: ^4.2.1
  gal: ^2.3.2

  # Utilities
  path: ^1.9.1
  path_provider: ^2.1.5
  yaml: ^3.1.3
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
