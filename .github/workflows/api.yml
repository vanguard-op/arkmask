name: Deploy — API

# Builds the backend Docker image and deploys to Cloud Run.
# Prod deploys automatically on merge to main (single active environment).
#
# TODO: When a separate staging environment is stood up, reinstate the
# two-stage flow: auto-deploy staging first, then require manual approval
# for prod. Steps: add deploy-staging job, set deploy-prod.needs to
# [build, deploy-staging], and gate deploy-prod with environment: prod
# (Required reviewers in GitHub Environments settings).
#
# TODO: Migrate back to Workload Identity Federation once WIF token issues
# are resolved. Replace credentials_json with workload_identity_provider +
# service_account + token_format: access_token in google-github-actions/auth.

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to which environment?'
        required: true
        default: 'prod'
        type: choice
        options: [prod]

permissions:
  contents: read

env:
  IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/arkmask/api

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      - name: Debug — verify SA and image path
        run: |
          echo "Image: ${{ env.IMAGE_BASE }}"
          echo "SA email: $(echo '${{ secrets.GCP_CREDENTIALS }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('client_email','?'))")"

      - name: Build and push Docker image
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${{ env.IMAGE_BASE }}:${SHORT_SHA}"
          docker build -t "${IMAGE}" -t "${{ env.IMAGE_BASE }}:latest" \
            -f backend/Dockerfile backend/
          docker push "${IMAGE}"
          docker push "${{ env.IMAGE_BASE }}:latest"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run (prod)
        run: |
          gcloud run deploy prod-arkmask-api \
            --image="${{ needs.build.outputs.image }}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe prod-arkmask-api \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "Prod API: ${URL}"
          curl --fail --silent --show-error "${URL}/health" || exit 1
