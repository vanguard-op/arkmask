name: Deploy — API

# Builds the backend Docker image and deploys to Cloud Run.
# Prod deploys automatically on merge to main (single active environment).
#
# TODO: When a separate staging environment is stood up, reinstate the
# two-stage flow: auto-deploy staging first, then require manual approval
# for prod. Steps: add deploy-staging job, set deploy-prod.needs to
# [build, deploy-staging], and gate deploy-prod with environment: prod
# (Required reviewers in GitHub Environments settings).

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to which environment?'
        required: true
        default: 'prod'
        type: choice
        options: [prod]

permissions:
  contents: read
  id-token: write

env:
  IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/arkmask/api

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${{ env.IMAGE_BASE }}:${SHORT_SHA}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          docker build -t "${IMAGE}" -t "${{ env.IMAGE_BASE }}:latest" \
            -f backend/Dockerfile backend/
          docker push "${IMAGE}"
          docker push "${{ env.IMAGE_BASE }}:latest"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
        id: meta

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (prod)
        run: |
          gcloud run deploy prod-arkmask-api \
            --image="${{ needs.build.outputs.image }}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe prod-arkmask-api \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "Prod API: ${URL}"
          curl --fail --silent --show-error "${URL}/health" || exit 1
