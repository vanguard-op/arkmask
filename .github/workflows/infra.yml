name: Infrastructure (Terraform)

# Runs terraform plan on every PR that touches infra/terraform/.
# Runs terraform apply (prod only, automatically) on merge to main.
#
# TODO: When a separate staging environment is stood up, reinstate the
# two-stage flow: staging-plan/apply runs first, then prod-plan/apply
# requires manual approval (prod environment → Required reviewers in
# GitHub Environments settings). Add staging jobs back above prod-plan,
# set prod-plan.needs: staging-apply, and set prod-apply.environment: prod.
#
# GCP authentication (WIF or SA key via GCP_CREDENTIALS) is provisioned and
# owned outside of this repo's Terraform — Terraform only manages resources
# needed to run the app itself.

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - 'infra/firebase/**'
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
      - 'infra/firebase/**'

permissions:
  contents: read
  pull-requests: write  # Required to post plan output as a PR comment
  id-token: write  # Required for Workload Identity Federation auth to GCP

# Serialize all runs against the prod state file — prevents concurrent
# plan/apply invocations from racing for the GCS state lock.
concurrency:
  group: infra-prod
  cancel-in-progress: false

env:
  TF_VERSION: '1.9.8'

jobs:
  # ── Prod plan (runs on PRs for review) ────────────────────────────────────
  prod-plan:
    name: Prod — Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: infra/terraform/envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          # Optional — set the ALERT_EMAIL repo/environment variable to get
          # paged by the Cloud Monitoring alerts in infra/terraform/modules/monitoring.
          # Empty is fine: alert policies are still created, just without a
          # notification channel.
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

      - name: Post plan to PR
        uses: actions/github-script@v9
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan — Prod 🔍
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ── Prod apply (auto on merge to main) ────────────────────────────────────
  prod-apply:
    name: Prod — Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    defaults:
      run:
        working-directory: infra/terraform/envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

  # ── Firebase rules deploy ──────────────────────────────────────────────────
  firebase-rules:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.modified, 'infra/firebase/')
    needs: prod-apply
    defaults:
      run:
        working-directory: infra/firebase

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA }}

      - name: Install Firebase CLI
        # Pinned: firebase-tools 15.22.2 has a WIF/ADC auth regression that
        # makes `firebase deploy` fail with "Failed to authenticate, have
        # you run firebase login?" even with valid credentials. Unpin once
        # upstream fixes it: https://github.com/firebase/firebase-tools/issues/10716
        run: npm install -g firebase-tools@15.22.1

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore --project ${{ vars.GCP_PROJECT_ID }}
