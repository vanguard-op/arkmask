name: Infrastructure (Terraform)

# Runs terraform plan on every PR that touches infra/terraform/.
# Runs terraform apply (prod only, automatically) on merge to main.
#
# TODO: When a separate staging environment is stood up, reinstate the
# two-stage flow: staging-plan/apply runs first, then prod-plan/apply
# requires manual approval (prod environment → Required reviewers in
# GitHub Environments settings). Add staging jobs back above prod-plan,
# set prod-plan.needs: staging-apply, and set prod-apply.environment: prod.
#
# TODO: Migrate back to Workload Identity Federation once WIF token issues
# are resolved. Replace credentials_json with workload_identity_provider +
# service_account in google-github-actions/auth.

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - 'infra/firebase/**'
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
      - 'infra/firebase/**'

permissions:
  contents: read
  pull-requests: write  # Required to post plan output as a PR comment

env:
  TF_VERSION: '1.9.8'

jobs:
  # ── Prod plan (runs on PRs for review) ────────────────────────────────────
  prod-plan:
    name: Prod — Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: infra/terraform/envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_repo: ${{ vars.GCP_GITHUB_REPO }}

      - name: Post plan to PR
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const output = `#### Terraform Plan — Prod 🔍
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ── Prod apply (auto on merge to main) ────────────────────────────────────
  prod-apply:
    name: Prod — Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    defaults:
      run:
        working-directory: infra/terraform/envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_repo: ${{ vars.GCP_GITHUB_REPO }}

  # ── Firebase rules deploy ──────────────────────────────────────────────────
  firebase-rules:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.modified, 'infra/firebase/')
    needs: prod-apply

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore --project ${{ secrets.GCP_PROJECT_ID }}
