name: Deploy — Workers

# Builds the workers Docker image (Cloud Tasks handlers: image / video / merge)
# and deploys to Cloud Run. Workers are NOT publicly accessible — invoked via
# Cloud Tasks using OIDC.
#
# Prod deploys automatically on merge to main (single active environment).
#
# TODO: When a separate staging environment is stood up, reinstate the
# two-stage flow: auto-deploy staging first, then require manual approval
# for prod (mirrors api.yml pattern).
#
# TODO: Migrate back to Workload Identity Federation once WIF token issues
# are resolved. Replace credentials_json with workload_identity_provider +
# service_account in google-github-actions/auth.
#
# NOTE: Requires workers/Dockerfile to exist. The path trigger only
# fires on changes to workers/** so this workflow won't run until
# the workers directory is created.

on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/arkmask/workers

jobs:
  build:
    name: Build & Push Workers Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      - name: Build and push workers image
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${{ env.IMAGE_BASE }}:${SHORT_SHA}"
          docker build -t "${IMAGE}" -t "${{ env.IMAGE_BASE }}:latest" \
            -f workers/Dockerfile workers/
          docker push "${IMAGE}"
          docker push "${{ env.IMAGE_BASE }}:latest"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

  deploy-prod:
    name: Deploy Workers to Prod
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy workers to Cloud Run (prod)
        run: |
          gcloud run deploy prod-arkmask-workers \
            --image="${{ needs.build.outputs.image }}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet
