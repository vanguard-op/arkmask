version: "3.9"

# Local development stack: FastAPI + PostgreSQL + MinIO (GCS substitute).
# Usage:
#   docker compose up -d          — start all services
#   docker compose up -d postgres minio  — start only deps (run FastAPI locally)
#   docker compose logs -f api    — tail API logs

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: arkmask
      POSTGRES_PASSWORD: arkmask
      POSTGRES_DB: arkmask
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkmask"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the default bucket on MinIO startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/arkmask-local;
        mc anonymous set download local/arkmask-local;
        echo 'Bucket arkmask-local ready.';
      "

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://arkmask:arkmask@postgres:5432/arkmask
      STORAGE_BUCKET: arkmask-local
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PRESIGN_TTL: 7200
      # Rewrite the internal Docker hostname in presigned URLs so that Android
      # emulators (10.0.2.2) and physical devices can actually fetch the image.
      # 10.0.2.2 = host machine as seen from the Android emulator.
      # Change to your LAN IP (e.g. 192.168.x.x:9000) for physical device testing.
      STORAGE_PRESIGN_BASE_URL: http://10.0.2.2:9000
      APP_ENV: local
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-arkmask-dev}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # hot-reload in dev
      - ./instructions:/app/instructions
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  minio_data:
