version: "3.9"

# Local development stack: FastAPI + MinIO (GCS substitute).
# Firestore is accessed via the Firebase Emulator or a real Firebase project
# (set FIREBASE_CREDENTIALS_PATH in .env to point to a service account JSON).
#
# Usage:
#   docker compose up -d          — start all services
#   docker compose up -d minio    — start only storage dep (run FastAPI locally)
#   docker compose logs -f api    — tail API logs

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the default bucket on MinIO startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/arkmask-local;
        mc anonymous set download local/arkmask-local;
        echo 'Bucket arkmask-local ready.';
      "

  api:
    build: .
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env          # all secrets and config live here; never committed
    environment:
      # These override or supplement .env with values that are either
      # static for local dev or derived from other Docker service hostnames.
      STORAGE_BUCKET: arkmask-local
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PRESIGN_TTL: 7200
      # Rewrite the internal Docker hostname in presigned URLs so that Android
      # emulators (10.0.2.2) and physical devices can actually fetch the image.
      # Change to your LAN IP (e.g. 192.168.x.x:9000) for physical device testing.
      STORAGE_PRESIGN_BASE_URL: http://10.0.2.2:9000
      APP_ENV: local
      # Absolute path inside the container where the service account JSON is mounted.
      # The file is bind-mounted below; this env var tells the app where to find it.
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-credentials.json
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # hot-reload in dev
      - ./instructions:/app/instructions
      # Mount the Firebase service account JSON (never committed — local file only).
      - ./arkmask-firebase.json:/run/secrets/firebase-credentials.json:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  minio_data:
